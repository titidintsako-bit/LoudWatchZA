name: Refresh Crime Data
on:
  schedule:
    - cron: '0 0 1 */3 *'  # Quarterly on the 1st
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crime data refresh
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/admin/refresh/crime" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}"
