name: Scrape SAPS Wanted & Missing Persons

on:
  schedule:
    # 06:00 UTC = 08:00 SAST (UTC+2)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  scrape-wanted:
    name: SAPS Wanted Persons Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 supabase python-dotenv

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd backend
          python scripts/scrape_wanted.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::SAPS wanted scraper failed — dashboard will show stale data with 'Last updated: X days ago' notice"
