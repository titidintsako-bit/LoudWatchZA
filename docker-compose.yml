version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on: [backend]
    restart: unless-stopped
volumes:
  backend_data:
